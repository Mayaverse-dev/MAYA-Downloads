<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAYA Admin</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="adm-body">

  <!-- Login screen -->
  <div id="admin-login" class="adm-login">
    <div class="adm-login-box">
      <div class="adm-login-logo">MAYA <span class="accent">Admin</span></div>
      <div class="adm-login-tagline">Restricted access — authorised personnel only.</div>

      <div class="adm-login-field" id="login-field-wrap">
        <input type="password" id="admin-pw" placeholder="Enter password" autocomplete="current-password">
        <button type="button" class="adm-pw-toggle" id="pw-toggle" aria-label="Show / hide password">
          <svg id="pw-eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="pw-eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>

      <div class="adm-login-error" id="login-error">Incorrect password. Try again.</div>
      <button id="admin-login-btn" class="btn btn-primary adm-login-btn">Enter</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="admin-dashboard" hidden class="adm-dashboard">

    <!-- Top bar -->
    <div class="adm-topbar">
      <span class="adm-brand">MAYA <span class="accent">Admin</span></span>
      <div class="adm-topbar-actions">
        <button id="adm-gamification-toggle-btn" class="btn">Gamification: ON</button>
        <button id="logout-btn" class="adm-logout">Log out</button>
      </div>
    </div>

    <!-- Categories panel -->
    <div class="adm-panel">
      <div class="adm-panel-hdr">
        <h3>Categories</h3>
        <button id="add-cat-toggle-btn" class="btn">+ Add</button>
      </div>
      <div id="cat-list" class="adm-cat-list"></div>
      <div id="add-cat-form-wrap" hidden class="adm-cat-add-form">
        <form id="add-cat-form">
          <input id="add-cat-slug" placeholder="Slug (e.g. videos)" required>
          <input id="add-cat-label" placeholder="Label (e.g. VIDEOS)" required>
          <input id="add-cat-desc" placeholder="Short description">
          <div class="adm-cat-form-btns">
            <button type="submit" class="btn btn-primary">Add category</button>
            <button type="button" id="add-cat-cancel" class="btn">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Download dashboard -->
    <div class="adm-panel adm-metrics-panel">
      <div class="adm-panel-hdr">
        <h3>Downloads Dashboard</h3>
        <button id="adm-refresh-dashboard-btn" class="btn">Refresh</button>
      </div>
      <div class="adm-metrics-grid">
        <div class="adm-metric-card">
          <span class="adm-metric-label">Total Downloads</span>
          <span id="adm-total-downloads" class="adm-metric-value">-</span>
        </div>
        <div class="adm-metric-card">
          <span class="adm-metric-label">Last 24 Hours</span>
          <span id="adm-downloads-24h" class="adm-metric-value">-</span>
        </div>
      </div>
      <div class="adm-metrics-foot">
        Last refreshed: <span id="adm-dashboard-updated-at">-</span>
      </div>
    </div>

    <!-- Assets toolbar -->
    <div class="adm-assets-bar">
      <div class="adm-tools">
        <input id="admin-search" type="search" placeholder="Search assets…">
        <select id="admin-filter-cat">
          <option value="">All categories</option>
        </select>
      </div>
      <button id="add-asset-btn" class="btn btn-primary">+ New Asset</button>
    </div>

    <!-- Asset grid -->
    <div id="admin-asset-grid" class="adm-asset-grid"></div>

  </div><!-- /dashboard -->

  <!-- Asset drawer -->
  <div id="asset-drawer" class="adm-drawer" aria-hidden="true">
    <div class="adm-drawer-backdrop" id="drawer-backdrop"></div>
    <div class="adm-drawer-panel">

      <div class="adm-drawer-hdr">
        <h2 id="drawer-title">Add Asset</h2>
        <button id="drawer-close" class="adm-drawer-close" aria-label="Close">&times;</button>
      </div>

      <div class="adm-drawer-body">
        <input type="hidden" id="d-id">

        <div class="adm-field-group">
          <label for="d-title">Title</label>
          <input id="d-title" type="text" placeholder="e.g. VAANAR">
        </div>

        <div class="adm-field-group">
          <label for="d-desc">Description</label>
          <textarea id="d-desc" rows="2" placeholder="Short description…"></textarea>
        </div>

        <div class="adm-field-row">
          <div class="adm-field-group">
            <label for="d-category">Category</label>
            <select id="d-category"></select>
          </div>
          <div class="adm-field-group" id="d-ebook-fields" hidden>
            <label for="d-chapter">Chapter #</label>
            <input id="d-chapter" type="number" min="1" placeholder="1">
          </div>
        </div>

        <div class="adm-field-group">
          <label for="d-unlock-threshold">Unlock Goal (downloads)</label>
          <input id="d-unlock-threshold" type="number" min="0" step="1" placeholder="0 = available immediately">
        </div>

        <div class="adm-field-group">
          <label>Thumbnail</label>
          <div id="d-thumb-zone" class="admin-upload-zone">
            <span id="d-thumb-zone-label">Click or drop image</span>
          </div>
          <input id="d-thumb-input" type="file" accept="image/*" hidden>
          <div id="d-thumb-preview" class="adm-thumb-preview" hidden>
            <img id="d-thumb-img" src="" alt="">
            <button type="button" id="d-thumb-clear" class="adm-thumb-clear">&times;</button>
          </div>
        </div>

        <!-- Variants section -->
        <div class="adm-variants-section">
          <div class="adm-variants-hdr">
            <span class="adm-variants-label">Files / Variants</span>
            <button type="button" id="add-variant-btn" class="btn">+ Add variant</button>
          </div>
          <div id="d-variants-list" class="adm-variants-list"></div>
        </div>

        <!-- Footer -->
        <div class="adm-drawer-footer">
          <div class="adm-visible-row">
            <span class="adm-visible-label">Show on site</span>
            <div id="d-visible" class="admin-toggle-switch on" role="switch" aria-checked="true" tabindex="0"></div>
          </div>
          <div class="adm-drawer-btns">
            <button id="drawer-cancel" class="btn">Cancel</button>
            <button id="drawer-save" class="btn btn-primary">Save</button>
          </div>
        </div>

      </div><!-- /drawer-body -->
    </div><!-- /drawer-panel -->
  </div><!-- /asset-drawer -->

  <script src="/js/admin.js?v=20260320-gamification"></script>
</body>
</html>
